name: GOD VM (KDE + CRD + Persist)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  vm:
    runs-on: ubuntu-22.04
    timeout-minutes: 350

    steps:

    - name: Install KDE + tools
      run: |
        sudo apt update
        echo "sddm shared/default-x-display-manager select sddm" | sudo debconf-set-selections

        sudo DEBIAN_FRONTEND=noninteractive apt install -y \
          kde-standard konsole dolphin \
          dbus-x11 x11-xserver-utils \
          wget curl unzip gh zstd flatpak

    - name: Install Chrome
      run: |
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt install -y ./google-chrome-stable_current_amd64.deb || true
        sudo apt -f install -y

    - name: Install CRD
      run: |
        wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
        sudo apt install -y ./chrome-remote-desktop_current_amd64.deb || true
        sudo apt -f install -y

        sudo bash -c 'cat > /etc/chrome-remote-desktop-session <<EOF
        export DESKTOP_SESSION=plasma
        export XDG_SESSION_DESKTOP=KDE
        export XDG_CURRENT_DESKTOP=KDE
        exec /usr/bin/startplasma-x11
        EOF'

    - name: Set password
      run: |
        echo "runner:${{ secrets.LINUX_PASS }}" | sudo chpasswd

    - name: Restore backup
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        ART=$(gh api repos/${{ github.repository }}/actions/artifacts \
        --jq '.artifacts[] | select(.name=="vm-backup" and .expired==false) | .id' | head -n 1 || true)

        if [ -n "$ART" ]; then
          gh api repos/${{ github.repository }}/actions/artifacts/$ART/zip > backup.zip
          unzip backup.zip
          sudo tar --zstd -xpf backup-home.tar.zst -C /
          sudo chown -R runner:runner /home/runner
        fi

    - name: Start CRD
      run: |
        DISPLAY= /opt/google/chrome-remote-desktop/start-host \
          --code="${{ secrets.CRD_CODE }}" \
          --redirect-url="https://remotedesktop.google.com/_/oauthredirect" \
          --name="$(hostname)" <<EOF
        ${{ secrets.CRD_PIN }}
        ${{ secrets.CRD_PIN }}
        EOF

    - name: Keep VM alive
      run: |
        for i in $(seq 1 67); do
          echo "VM running ($i/67)"
          sleep 300
        done

    - name: Backup home
      run: |
        sudo tar --zstd -cpf backup-home.tar.zst /home/runner

    - name: Upload backup
      uses: actions/upload-artifact@v4
      with:
        name: vm-backup
        path: backup-home.tar.zst
        retention-days: 7

    - name: Restart workflow
      run: |
        gh api repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
        -X POST -f ref=main
