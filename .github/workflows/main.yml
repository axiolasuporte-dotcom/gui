name: Chrome Remote Desktop (KDE Plasma)

on:
  workflow_dispatch:

jobs:
  crd:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install Chrome Remote Desktop + KDE Plasma
        run: |
          set -euxo pipefail

          sudo apt-get update

          # Evita prompts (tipo escolher display manager)
          echo "sddm shared/default-x-display-manager select sddm" | sudo debconf-set-selections

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            wget curl \
            dbus-x11 x11-xserver-utils \
            kde-standard konsole dolphin \
            xscreensaver

          # Instala o host do Chrome Remote Desktop
          wget -O crd.deb https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ./crd.deb || true
          sudo apt-get -f install -y

          # Diz pro CRD iniciar o KDE Plasma (X11)
          sudo bash -c 'cat > /etc/chrome-remote-desktop-session <<EOF
          export DESKTOP_SESSION=plasma
          export XDG_SESSION_DESKTOP=KDE
          export XDG_CURRENT_DESKTOP=KDE
          exec /usr/bin/startplasma-x11
          EOF'

          sudo systemctl daemon-reload

      - name: Start Chrome Remote Desktop host (headless)
        env:
          CRD_CODE: ${{ secrets.CRD_CODE }}
          CRD_PIN: ${{ secrets.CRD_PIN }}
        run: |
          set -euxo pipefail

          if [ -z "${CRD_CODE:-}" ] || [ -z "${CRD_PIN:-}" ]; then
            echo "Missing secrets. Add CRD_CODE and CRD_PIN in GitHub repo secrets."
            exit 1
          fi

          DISPLAY= /opt/google/chrome-remote-desktop/start-host \
            --code="${CRD_CODE}" \
            --redirect-url="https://remotedesktop.google.com/_/oauthredirect" \
            --name="$(hostname)" <<EOF
          ${CRD_PIN}
          ${CRD_PIN}
          EOF

          echo "==== CRD READY ===="
          echo "Open: remotedesktop.google.com/access"
          echo "Select this machine: $(hostname)"
          echo "==================="

      - name: Keep runner alive
        run: |
          while true; do
            echo "CRD running..."
            sleep 300
          done
