name: RDP KDE Plasma (ngrok)

on:
workflow_dispatch:

jobs:
rdp:
runs-on: ubuntu-22.04
timeout-minutes: 360

steps:
  - name: Create RDP user
    run: |
      PASSWORD=$(openssl rand -base64 12)
      echo "RDP_PASS=$PASSWORD" >> $GITHUB_ENV
      sudo useradd -m -s /bin/bash rdpuser || true
      echo "rdpuser:$PASSWORD" | sudo chpasswd
      sudo usermod -aG sudo rdpuser

  - name: Install KDE + XRDP
    run: |
      sudo apt update
      sudo DEBIAN_FRONTEND=noninteractive apt install -y \
      xrdp xorgxrdp \
      kde-plasma-desktop \
      dbus-x11 \
      ssl-cert curl

      echo "startplasma-x11" | sudo tee /home/rdpuser/.xsession
      sudo chown rdpuser:rdpuser /home/rdpuser/.xsession

      sudo systemctl enable xrdp
      sudo systemctl restart xrdp

  - name: Install ngrok
    run: |
      curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
      tar -xzf ngrok.tgz
      sudo mv ngrok /usr/local/bin

  - name: Authenticate ngrok
    run: |
      ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

  - name: Start ngrok
    run: |
      ngrok tcp 3389 --log stdout > ngrok.log &
      sleep 10
      cat ngrok.log

      echo "====== RDP LOGIN ======"
      echo "User: rdpuser"
      echo "Password: $RDP_PASS"
      echo "======================="

  - name: Keep Alive
    run: |
      while true; do
        echo "RDP running..."
        sleep 300
      done
