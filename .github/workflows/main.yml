name: RDP (LocalXpose via NPM)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Setup RDP
        run: |
          set -euxo pipefail

          sudo apt update
          sudo apt install -y xrdp xfce4 xfce4-goodies curl

          PASSWORD=$(openssl rand -base64 10)
          echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV

          sudo useradd -m rdpuser || true
          echo "rdpuser:$PASSWORD" | sudo chpasswd

          sudo mkdir -p /home/rdpuser
          sudo chown -R rdpuser:rdpuser /home/rdpuser

          echo "startxfce4" | sudo tee /home/rdpuser/.xsession > /dev/null
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession

          sudo systemctl restart xrdp

      - name: Install LocalXpose (loclx) via npm
        run: |
          set -euxo pipefail

          sudo apt update
          sudo apt install -y nodejs npm

          # método oficial: npm install -g loclx
          sudo npm install -g loclx

          # só pra confirmar que existe
          loclx --help | head -n 5

      - name: Start LocalXpose tunnel (TCP 3389)
        run: |
          set -euxo pipefail

          loclx account login --token ${{ secrets.LOCXL_AUTH_TOKEN }}

          # inicia o túnel em background e mostra logs
          loclx tunnel tcp --to localhost:3389 > tunnel.log 2>&1 &
          sleep 10

          echo "========== TUNNEL LOG =========="
          cat tunnel.log
          echo "==============================="

          echo "====== RDP LOGIN ======"
          echo "User: rdpuser"
          echo "Password: $PASSWORD"
          echo "====================="

      - name: Keep runner alive
        run: |
          while true; do
            echo "RDP running..."
            sleep 300
          done
