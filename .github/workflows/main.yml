name: Chrome Remote Desktop (XFCE)

on:
  workflow_dispatch:

jobs:
  crd:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install Chrome Remote Desktop + XFCE
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            wget curl \
            xfce4 desktop-base dbus-x11 xscreensaver

          # Install Chrome Remote Desktop host (.deb official download)
          wget -O crd.deb https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ./crd.deb || true
          sudo apt-get -f install -y

          # Tell CRD to start XFCE session
          sudo bash -c 'echo "exec /etc/X11/Xsession /usr/bin/xfce4-session" > /etc/chrome-remote-desktop-session'

          # Make sure service files are available
          sudo systemctl daemon-reload

      - name: Start Chrome Remote Desktop host (headless)
        env:
          CRD_CODE: ${{ secrets.CRD_CODE }}
          CRD_PIN: ${{ secrets.CRD_PIN }}
        run: |
          set -euxo pipefail

          if [ -z "${CRD_CODE:-}" ] || [ -z "${CRD_PIN:-}" ]; then
            echo "Missing secrets. Add CRD_CODE and CRD_PIN in GitHub repo secrets."
            exit 1
          fi

          # Start-host command (headless). Code is single-use and expires quickly.
          # PIN will be prompted twice; we feed it non-interactively.
          DISPLAY= /opt/google/chrome-remote-desktop/start-host \
            --code="${CRD_CODE}" \
            --redirect-url="https://remotedesktop.google.com/_/oauthredirect" \
            --name="$(hostname)" <<EOF
          ${CRD_PIN}
          ${CRD_PIN}
          EOF

          echo "==== CRD READY ===="
          echo "Open: remotedesktop.google.com/access"
          echo "Sign in with the SAME Google account used to generate CRD_CODE."
          echo "Select this machine: $(hostname)"
          echo "==================="

      - name: Keep runner alive
        run: |
          while true; do
            echo "CRD running..."
            sleep 300
          done
