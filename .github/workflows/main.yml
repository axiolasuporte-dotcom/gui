name: CRD Token Test

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  crd:
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:

      - name: Install KDE + CRD + tools
        run: |
          set -euxo pipefail
          sudo apt-get update

          echo "sddm shared/default-x-display-manager select sddm" | sudo debconf-set-selections

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            wget curl unzip \
            dbus-x11 x11-xserver-utils \
            kde-standard konsole dolphin \
            xscreensaver \
            fonts-noto fonts-noto-cjk fonts-noto-color-emoji \
            language-pack-pt language-pack-pt-base \
            gh zstd

          sudo update-locale LANG=pt_BR.UTF-8

          wget -O crd.deb https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ./crd.deb || true
          sudo apt-get -f install -y

          sudo bash -c 'cat > /etc/chrome-remote-desktop-session <<EOF
          export DESKTOP_SESSION=plasma
          export XDG_SESSION_DESKTOP=KDE
          export XDG_CURRENT_DESKTOP=KDE
          exec /usr/bin/startplasma-x11
          EOF'

          sudo systemctl daemon-reload


      - name: Set runner password
        env:
          RUNNER_PW: ${{ secrets.RUNNER_PW }}
        run: |
          set -euxo pipefail
          PW="${RUNNER_PW:-runner}"
          echo "runner:${PW}" | sudo chpasswd


      - name: Make runner admin
        run: |
          set -euxo pipefail
          sudo usermod -aG sudo runner


      - name: Configure KDE fonts (bigger)
        run: |
          set -euxo pipefail

          mkdir -p /home/runner/.config

          cat > /home/runner/.config/kcmfonts <<EOF
          [General]
          forceFontDPI=120
          EOF

          sudo chown -R runner:runner /home/runner/.config


      - name: Restore latest backup (if exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail

          mkdir -p /tmp/restore

          ART_ID="$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts | map(select(.name=="crd-test-backup" and .expired==false)) | sort_by(.created_at) | last | .id // empty')"

          if [ -z "${ART_ID}" ]; then
            echo "No previous backup found."
            exit 0
          fi

          gh api \
            repos/${{ github.repository }}/actions/artifacts/${ART_ID}/zip \
            > /tmp/restore/artifact.zip

          unzip -o /tmp/restore/artifact.zip -d /tmp/restore

          if [ -f /tmp/restore/backup-home.tar.zst ]; then
            sudo tar --zstd -xpf /tmp/restore/backup-home.tar.zst -C /
            sudo chown -R runner:runner /home/runner
          fi


      - name: Start CRD (token first, fallback code)
        env:
          CRD_CODE: ${{ secrets.CRD_CODE }}
          CRD_PIN: ${{ secrets.CRD_PIN }}
        run: |
          set -euxo pipefail

          mkdir -p /home/runner/.config/chrome-remote-desktop

          TOKEN_COUNT="$(find /home/runner/.config/chrome-remote-desktop -maxdepth 1 -type f | wc -l || true)"

          STARTED=0

          if [ "${TOKEN_COUNT}" -gt 0 ]; then
            echo "Trying restored token..."
            if /opt/google/chrome-remote-desktop/start-host --name="$(hostname)"; then
              STARTED=1
            fi
          fi

          if [ "${STARTED}" -eq 0 ]; then
            echo "Using CRD_CODE..."
            DISPLAY= /opt/google/chrome-remote-desktop/start-host \
              --code="${CRD_CODE}" \
              --redirect-url="https://remotedesktop.google.com/_/oauthredirect" \
              --name="$(hostname)" <<EOF
          ${CRD_PIN}
          ${CRD_PIN}
          EOF
          fi

          echo "==== CRD READY ===="
          echo "https://remotedesktop.google.com/access"
          echo "==================="


      - name: Keep alive for 4 minutes
        run: |
          set -euxo pipefail
          sleep 240


      - name: Create backup
        run: |
          set -euxo pipefail

          sudo mkdir -p /tmp/backup

          sudo tar --zstd -cpf /tmp/backup/backup-home.tar.zst \
            --exclude=/home/runner/.cache \
            --exclude=/home/runner/.local/share/Trash \
            /home/runner


      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: crd-test-backup
          path: /tmp/backup/backup-home.tar.zst
          retention-days: 3


      - name: Dispatch next run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail

          gh api \
            repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
            -X POST \
            -f ref="${{ github.ref_name }}"
