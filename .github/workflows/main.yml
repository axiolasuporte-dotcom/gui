name: RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Setup RDP
        run: |
          sudo apt update
          sudo apt install -y xrdp xfce4 xfce4-goodies curl

          PASSWORD=$(openssl rand -base64 10)
          echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV

          sudo useradd -m rdpuser || true
          echo "rdpuser:$PASSWORD" | sudo chpasswd

          sudo mkdir -p /home/rdpuser
          sudo chown -R rdpuser:rdpuser /home/rdpuser

          echo "startxfce4" | sudo tee /home/rdpuser/.xsession > /dev/null
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession

          sudo systemctl restart xrdp

      - name: Install ngrok
        run: |
          curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xzf ngrok.tgz
          sudo mv ngrok /usr/local/bin/ngrok

      - name: Start tunnel
        run: |
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 3389 --log stdout > ngrok.log &
          sleep 10
          cat ngrok.log

          echo "====== LOGIN ======"
          echo "User: rdpuser"
          echo "Password: $PASSWORD"
          echo "==================="

      - name: Keep alive
        run: |
          while true; do
            echo "running..."
            sleep 300
          done
