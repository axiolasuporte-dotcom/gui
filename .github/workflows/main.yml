name: RDP KDE Plasma (ngrok)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Create RDP user + password
        run: |
          set -euxo pipefail

          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/')"
          echo "RDP_USER=rdpuser" >> "$GITHUB_ENV"
          echo "RDP_PASS=$PASSWORD" >> "$GITHUB_ENV"

          sudo useradd -m -s /bin/bash rdpuser || true
          echo "rdpuser:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo rdpuser

      - name: Install KDE Plasma + XRDP (fix HOME/env)
        run: |
          set -euxo pipefail
          sudo apt-get update

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xrdp xorgxrdp \
            kde-plasma-desktop plasma-workspace \
            dbus-x11 x11-xserver-utils \
            netcat-openbsd curl

          # Ensure home perms are correct
          sudo mkdir -p /home/rdpuser
          sudo chown -R rdpuser:rdpuser /home/rdpuser
          sudo chmod 755 /home/rdpuser

          # Start KDE session for rdpuser
          sudo -u rdpuser bash -lc 'echo "startplasma-x11" > ~/.xsession'
          sudo chmod 644 /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession

          # XRDP start script: FORCE correct HOME (prevents /home/runner bugs)
          sudo bash -c 'cat > /etc/xrdp/startwm.sh' <<'EOF'
          #!/bin/sh
          set -e

          export USER="${LOGNAME:-$(id -un)}"
          export HOME="/home/$USER"
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_CACHE_HOME="$HOME/.cache"
          export XDG_DATA_HOME="$HOME/.local/share"

          rm -f "$HOME/.Xauthority" "$HOME/.ICEauthority"

          mkdir -p "$HOME" "$XDG_CONFIG_HOME" "$XDG_CACHE_HOME" "$XDG_DATA_HOME"
          chown -R "$USER:$USER" "$HOME" || true

          exec startplasma-x11
          EOF

          sudo chmod +x /etc/xrdp/startwm.sh

          sudo adduser xrdp ssl-cert || true
          sudo systemctl restart xrdp

          # Sanity check
          nc -zv localhost 3389

      - name: Install ngrok
        run: |
          set -euxo pipefail
          curl -fsSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xzf ngrok.tgz
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok version

      - name: Auth ngrok
        run: |
          set -euxo pipefail
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

      - name: Start ngrok TCP tunnel (RDP)
        run: |
          set -euxo pipefail

          # Start tunnel in background
          nohup ngrok tcp 3389 --log=stdout > ngrok.log 2>&1 &
          sleep 4

          # Read tunnel info from ngrok local API
          # (ngrok starts an API on 127.0.0.1:4040 by default)
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:4040/api/tunnels >/tmp/tunnels.json; then
              break
            fi
            sleep 1
          done

          echo "=== RDP CREDS ==="
          echo "User: $RDP_USER"
          echo "Pass: $RDP_PASS"
          echo "================="

          echo "=== NGROK ADDRESS ==="
          cat /tmp/tunnels.json | python3 - <<'PY'
          import json, sys
          data = json.load(sys.stdin)
          tunnels = data.get("tunnels", [])
          tcp = None
          for t in tunnels:
            if t.get("proto") == "tcp":
              tcp = t.get("public_url")
              break
          if not tcp:
            print("Could not find tcp tunnel. Printing ngrok.log:\n")
            sys.exit(1)
          # public_url looks like: tcp://0.tcp.ngrok.io:12345
          print("Connect to:", tcp.replace("tcp://", ""))
          print("Port: 3389 (already included in address)")
          PY
          echo "====================="

      - name: Keep alive
        run: |
          while true; do
            echo "[$(date)] RDP + ngrok active"
            sleep 300
          done
