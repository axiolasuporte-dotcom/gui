name: RDP (LocalXpose via npm)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Setup RDP (XRDP + XFCE)
        run: |
          set -euxo pipefail

          sudo apt update
          sudo apt install -y xrdp xfce4 xfce4-goodies curl

          PASSWORD=$(openssl rand -base64 10)
          echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV

          sudo useradd -m rdpuser || true
          echo "rdpuser:$PASSWORD" | sudo chpasswd

          sudo mkdir -p /home/rdpuser
          sudo chown -R rdpuser:rdpuser /home/rdpuser

          echo "startxfce4" | sudo tee /home/rdpuser/.xsession > /dev/null
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession

          sudo systemctl restart xrdp

      - name: Install LocalXpose (npm) + fix PATH
        run: |
          set -euxo pipefail

          sudo apt update
          sudo apt install -y nodejs npm

          sudo npm install -g loclx

          NPM_BIN="$(npm bin -g)"
          echo "npm global bin: $NPM_BIN"

          # add to PATH for next steps
          echo "$NPM_BIN" >> $GITHUB_PATH

          # also for current step (test now)
          export PATH="$NPM_BIN:$PATH"

          which loclx || true
          loclx --help || true

      - name: Start LocalXpose tunnel (TCP 3389)
        run: |
          set -euxo pipefail

          NPM_BIN="$(npm bin -g)"
          export PATH="$NPM_BIN:$PATH"

          if command -v loclx >/dev/null 2>&1; then
            LOC="loclx"
          else
            LOC="npx -y loclx"
          fi

          $LOC account login --token ${{ secrets.LOCXL_AUTH_TOKEN }}

          $LOC tunnel tcp --to localhost:3389 > tunnel.log 2>&1 &
          sleep 10

          echo "========== TUNNEL LOG =========="
          cat tunnel.log
          echo "==============================="

          echo "====== RDP LOGIN ======"
          echo "User: rdpuser"
          echo "Password: $PASSWORD"
          echo "====================="

      - name: Keep runner alive
        run: |
          while true; do
            echo "RDP running..."
            sleep 300
          done
