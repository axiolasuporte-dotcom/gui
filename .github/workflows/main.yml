name: RDP (LocalXpose)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Setup RDP
        run: |
          sudo apt update
          sudo apt install -y xrdp xfce4 xfce4-goodies curl

          PASSWORD=$(openssl rand -base64 10)
          echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV

          sudo useradd -m rdpuser || true
          echo "rdpuser:$PASSWORD" | sudo chpasswd

          sudo mkdir -p /home/rdpuser
          sudo chown -R rdpuser:rdpuser /home/rdpuser

          echo "startxfce4" | sudo tee /home/rdpuser/.xsession > /dev/null
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession

          sudo systemctl restart xrdp

      - name: Install LocalXpose
        run: |
          curl -s https://loclx.io/install.sh | sudo bash

      - name: Start tunnel
        run: |
          loclx account login --token ${{ secrets.LOCXL_AUTH_TOKEN }}

          loclx tunnel tcp --to localhost:3389 > tunnel.log &
          sleep 10
          cat tunnel.log

          echo "====== LOGIN ======"
          echo "User: rdpuser"
          echo "Password: $PASSWORD"
          echo "==================="

      - name: Keep alive
        run: |
          while true; do
            echo "running..."
            sleep 300
          done
