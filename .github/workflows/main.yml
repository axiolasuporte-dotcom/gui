name: Ubuntu RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 3600

    steps:
      - name: Create RDP User with Secure Password
        run: |
          PASSWORD=$(openssl rand -base64 12)
          echo "RDP_CREDS=User: rdpuser | Password: $PASSWORD" >> $GITHUB_ENV
          
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo rdpuser

      - name: Install Desktop Environment and XRDP
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xfce4 xfce4-goodies xrdp netcat-openbsd
          
          echo "xfce4-session" > /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession
          
          sudo adduser xrdp ssl-cert
          sudo systemctl restart xrdp

      # --- This is the most reliable way to use Tailscale in GitHub Actions ---
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          hostname: gh-runner-ubuntu-${{ github.run_id }}

      - name: Verify RDP Accessibility
        run: |
          # The official action automatically sets the Tailscale IP to $TAILSCALE_IP
          # Wait a few seconds for the network to settle
          sleep 5 
          
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
          echo "Tailscale IP: $TS_IP"
          
          if nc -z localhost 3389; then
              echo "TCP connectivity successful! XRDP is listening."
          else
              echo "TCP connection to RDP port 3389 failed"
              exit 1
          fi

      - name: Maintain Connection
        run: |
          echo " "
          echo "=== RDP ACCESS ==="
          echo "Address: $TAILSCALE_IP"
          echo "$RDP_CREDS"
          echo "=================="
          echo " "
          
          while true; do
              echo "[$(date)] RDP Active - Cancel workflow manually to terminate"
              sleep 300
          done
